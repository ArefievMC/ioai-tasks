<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IOAI Task Bank</title>
<script>
(function(){
  var PW = "322";
  if (sessionStorage.getItem("ioai_auth") === "1") return;
  document.addEventListener("DOMContentLoaded", function(){
    document.body.style.visibility = "hidden";
    var ov = document.createElement("div");
    ov.id = "pw-gate";
    ov.style.cssText = "position:fixed;inset:0;background:#0a0820;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Inter,system-ui,sans-serif;visibility:visible;";
    ov.innerHTML = '<div style="background:#1e1f44;padding:32px 36px;border-radius:14px;border:1px solid #2e3060;min-width:320px;text-align:center;color:#e8e8ff;">'
      + '<div style="font-size:22px;font-weight:800;margin-bottom:6px;">🔒 IOAI Task Bank</div>'
      + '<div style="font-size:13px;color:#8a8ab8;margin-bottom:18px;">Введи пароль для доступа</div>'
      + '<input id="pw" type="password" autofocus style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2e3060;background:#0f1023;color:#e8e8ff;font:inherit;font-size:14px;outline:none;text-align:center;letter-spacing:4px;" />'
      + '<div id="pw-err" style="color:#ff6b6b;font-size:12px;margin-top:8px;height:14px;"></div>'
      + '<button id="pw-go" style="margin-top:10px;width:100%;padding:10px;border-radius:8px;border:0;background:#6b5cff;color:#fff;font:inherit;font-weight:700;cursor:pointer;">Войти</button>'
      + '</div>';
    document.documentElement.appendChild(ov);
    var pw = ov.querySelector("#pw"), btn = ov.querySelector("#pw-go"), err = ov.querySelector("#pw-err");
    function tryIt(){
      if (pw.value === PW) {
        sessionStorage.setItem("ioai_auth","1");
        ov.remove();
        document.body.style.visibility = "visible";
      } else {
        err.textContent = "неверный пароль";
        pw.value = "";
        pw.focus();
      }
    }
    btn.addEventListener("click", tryIt);
    pw.addEventListener("keydown", function(e){ if (e.key === "Enter") tryIt(); });
  });
})();
</script>
<style>
  :root {
    --bg: #0f1023;
    --bg2: #1a1b3a;
    --card: #1e1f44;
    --card-hover: #25275a;
    --accent: #b8860b;
    --accent2: #6b5cff;
    --text: #e8e8ff;
    --muted: #8a8ab8;
    --border: #2e3060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(160deg, #0a0820 0%, #14123a 60%, #1a1742 100%);
    color: var(--text); min-height: 100vh;
  }
  header {
    padding: 28px 24px 16px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.25); backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 10;
  }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: 0.3px; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .controls {
    display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; align-items: center;
  }
  input, select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 10px; font: inherit; font-size: 14px;
    outline: none;
  }
  input { flex: 1; min-width: 240px; }
  input:focus, select:focus { border-color: var(--accent2); }
  .counter { color: var(--muted); font-size: 13px; margin-left: auto; }

  main { padding: 20px 24px 60px; max-width: 1100px; margin: 0 auto; }
  .grid {
    display: flex; flex-direction: column; gap: 12px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; transition: all 0.15s ease;
    display: flex; flex-direction: column; gap: 8px;
    cursor: pointer;
  }
  .card:hover { background: var(--card-hover); border-color: var(--accent2); transform: translateY(-1px); }
  .card.expanded { border-color: var(--accent2); }
  .src {
    color: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .src .toggle { color: var(--muted); font-size: 10px; margin-left: auto; }
  .name {
    font-size: 16px; font-weight: 700; line-height: 1.3;
  }
  .name a { color: var(--text); text-decoration: none; }
  .name a:hover { color: var(--accent2); }
  .desc {
    color: var(--muted); font-size: 13px; line-height: 1.5; white-space: pre-wrap;
  }
  .card:not(.expanded) .desc {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; max-height: 3em;
  }
  .full {
    display: none;
    border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px;
    color: var(--text); font-size: 13.5px; line-height: 1.6;
  }
  .card.expanded .full { display: block; }
  .full h1, .full h2, .full h3 { color: var(--accent); margin: 14px 0 6px; font-weight: 700; }
  .full h1 { font-size: 18px; }
  .full h2 { font-size: 16px; }
  .full h3 { font-size: 14px; }
  .full p { margin: 0 0 10px; }
  .full ul, .full ol { padding-left: 22px; margin: 0 0 10px; }
  .full li { margin: 3px 0; }
  .full code { background: #0f1023; padding: 1px 5px; border-radius: 3px;
    font-family: "SFMono-Regular",Menlo,Consolas,monospace; font-size: 12px; color: #b9b4ff; }
  .full pre { background: #0f1023; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; overflow-x: auto; margin: 0 0 10px; }
  .full pre code { background: none; padding: 0; }
  .full table { border-collapse: collapse; margin: 0 0 10px; font-size: 12px; }
  .full th, .full td { border: 1px solid var(--border); padding: 6px 10px; }
  .full th { background: rgba(107,92,255,0.1); }
  .full hr { border: 0; border-top: 1px solid var(--border); margin: 14px 0; }
  .full strong { color: var(--text); }
  .full em { color: #b9b4ff; }
  .full blockquote { border-left: 3px solid var(--accent2); padding-left: 12px; color: var(--muted); margin: 0 0 10px; }
  .no-full { color: var(--muted); font-size: 12px; font-style: italic; }
  .topics {
    display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px;
  }
  .topic {
    background: rgba(107, 92, 255, 0.13); color: #b9b4ff;
    padding: 3px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap;
    cursor: pointer;
  }
  .topic.active { background: var(--accent2); color: #fff; }
  .topic:hover { background: rgba(107, 92, 255, 0.3); }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: rgba(184, 134, 11, 0.18); color: var(--accent);
    padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .tag:hover { background: rgba(184, 134, 11, 0.35); }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  a.url { color: var(--accent2); font-size: 12px; text-decoration: none; word-break: break-all; }
  a.url:hover { text-decoration: underline; }
  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 30px 20px; }
</style>
</head>
<body>
<header>
  <h1>🧠 IOAI Task Bank</h1>
  <div class="sub" id="sub">Loading…</div>
  <div class="controls">
    <input id="q" placeholder="🔍 поиск по названию, источнику, описанию, тэгу…">
    <select id="src"><option value="">все источники</option></select>
    <select id="tag"><option value="">все категории</option></select>
    <select id="topic"><option value="">все топики (силлабус)</option></select>
    <span class="counter" id="cnt"></span>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">нет задач под этот фильтр</div>
</main>
<footer>auto-built from <code>tasks_final.csv</code></footer>

<script>
let DATA = null, ACTIVE_TOPIC = null;

async function load() {
  const r = await fetch('tasks_data.json');
  DATA = await r.json();
  document.getElementById('sub').textContent =
    `${DATA.count} задач из ${DATA.sources.length} источников · ${DATA.topics.length} топиков`;
  const srcSel = document.getElementById('src');
  DATA.sources.forEach(s => srcSel.add(new Option(s, s)));
  const tagSel = document.getElementById('tag');
  (DATA.tags || []).forEach(t => tagSel.add(new Option(t, t)));
  const tpSel = document.getElementById('topic');
  DATA.topics.forEach(t => tpSel.add(new Option(t, t)));
  document.getElementById('q').addEventListener('input', render);
  srcSel.addEventListener('change', render);
  tagSel.addEventListener('change', render);
  tpSel.addEventListener('change', () => { ACTIVE_TOPIC = tpSel.value || null; render(); });
  render();
}

function host(u) {
  try { return new URL(u).hostname; } catch(_) { return ''; }
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const src = document.getElementById('src').value;
  const tag = document.getElementById('tag').value;
  const tp = document.getElementById('topic').value;
  let items = DATA.tasks.filter(t => {
    if (src && t.source !== src) return false;
    if (tag && !(t.tags || []).includes(tag)) return false;
    if (tp && !t.topics.includes(tp)) return false;
    if (q) {
      const blob = (t.name + ' ' + t.source + ' ' + t.description + ' ' +
                    t.topics.join(' ') + ' ' + (t.tags||[]).join(' ')).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('cnt').textContent = `${items.length} / ${DATA.count}`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('empty').style.display = items.length === 0 ? 'block' : 'none';
  items.forEach(t => {
    const card = document.createElement('div'); card.className = 'card';
    const desc = t.description || '(описание отсутствует)';
    const fullHtml = t.full_description
      ? renderMd(t.full_description)
      : '<div class="no-full">Полный markdown недоступен — заходи по ссылке выше.</div>';
    card.innerHTML = `
      <div class="src">${escapeHtml(t.source)} · ${host(t.url)} <span class="toggle">▼</span></div>
      <div class="name"><a href="${t.url}" target="_blank" rel="noopener">${escapeHtml(t.name)}</a></div>
      <div class="tags">${(t.tags||[]).map(tg =>
        `<span class="tag" data-tag="${escapeHtml(tg)}">${escapeHtml(tg)}</span>`
      ).join('')}</div>
      <div class="desc">${escapeHtml(desc)}</div>
      <div class="topics">${t.topics.map(tp =>
        `<span class="topic ${tp===ACTIVE_TOPIC?'active':''}" data-topic="${escapeHtml(tp)}">${escapeHtml(tp)}</span>`
      ).join('')}</div>
      <div class="full">${fullHtml}</div>
      <a class="url" href="${t.url}" target="_blank" rel="noopener">${escapeHtml(t.url)}</a>
    `;
    // клик по карточке раскрывает/сворачивает (кроме кликов по ссылкам и топикам)
    card.addEventListener('click', e => {
      if (e.target.closest('a') || e.target.closest('.topic')) return;
      card.classList.toggle('expanded');
      card.querySelector('.toggle').textContent = card.classList.contains('expanded') ? '▲' : '▼';
    });
    card.querySelectorAll('.topic').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const v = el.dataset.topic;
        document.getElementById('topic').value = v;
        ACTIVE_TOPIC = v; render();
      });
    });
    card.querySelectorAll('.tag').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('tag').value = el.dataset.tag;
        render();
      });
    });
    grid.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// Минимальный markdown → HTML рендерер (header, list, code, link, bold, italic, hr, blockquote, table)
function renderMd(md) {
  let s = escapeHtml(md);
  // fenced code blocks ```...```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.replace(/\n$/,'')}</code></pre>`);
  // inline code `...`
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // bold **text** and __text__
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
       .replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // italic *text* and _text_  (avoid bold collisions)
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
       .replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
  // build line-based output
  const lines = s.split('\n');
  const out = []; let inUl=false, inOl=false, inBq=false, inTbl=false;
  function close() {
    if (inUl) { out.push('</ul>'); inUl=false; }
    if (inOl) { out.push('</ol>'); inOl=false; }
    if (inBq) { out.push('</blockquote>'); inBq=false; }
    if (inTbl) { out.push('</tbody></table>'); inTbl=false; }
  }
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    let m;
    if (/^---+\s*$/.test(line)) { close(); out.push('<hr>'); continue; }
    if (m = line.match(/^(#{1,6})\s+(.*)$/)) { close(); out.push(`<h${m[1].length}>${m[2]}</h${m[1].length}>`); continue; }
    if (m = line.match(/^\s*[-*]\s+(.*)$/)) {
      if (!inUl) { close(); out.push('<ul>'); inUl=true; }
      out.push(`<li>${m[1]}</li>`); continue;
    }
    if (m = line.match(/^\s*\d+\.\s+(.*)$/)) {
      if (!inOl) { close(); out.push('<ol>'); inOl=true; }
      out.push(`<li>${m[1]}</li>`); continue;
    }
    if (m = line.match(/^&gt;\s?(.*)$/)) {
      if (!inBq) { close(); out.push('<blockquote>'); inBq=true; }
      out.push(`<p>${m[1]}</p>`); continue;
    }
    // table row
    if (line.includes('|') && line.trim().startsWith('|')) {
      const cells = line.split('|').slice(1,-1).map(c => c.trim());
      // separator row
      if (cells.every(c => /^:?-+:?$/.test(c))) continue;
      if (!inTbl) { close(); out.push('<table><tbody>'); inTbl=true; }
      out.push('<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>');
      continue;
    }
    if (line.trim() === '') { close(); continue; }
    close();
    out.push(`<p>${line}</p>`);
  }
  close();
  return out.join('\n');
}

load().catch(e => {
  document.getElementById('sub').textContent = 'ошибка загрузки: ' + e;
});
</script>
</body>
</html>
